<!DOCTYPE html>
<html>
<head>
    <title>Kiston Admin Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: white; text-align: center; padding: 20px; }
        .stat-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .card { background: #16213e; padding: 20px; border-radius: 15px; border: 1px solid #0f3460; min-width: 150px; }
        .chart-box, .search-box { background: #16213e; padding: 25px; border-radius: 15px; max-width: 600px; margin: 20px auto; border: 1px solid #0f3460; }
        button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 60%; }
        .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; }
        .btn-blue { background: #00d2ff; color: #1a1a2e; }
    </style>
</head>
<body>

    <h1>📊 Kiston Cafe Pro Dashboard</h1>

    <div class="stat-container">
        <div class="card"><small>รายได้รวม</small><h2 id="total_revenue">0</h2></div>
        <div class="card"><small>แต้มรวม</small><h2 id="total_points">0</h2></div>
    </div>

    <button onclick="loadAll()">🔄 อัปเดตข้อมูลทั้งหมด</button>

    <div class="chart-box">
        <h3>🏆 Top 5 ลูกค้า VIP</h3>
        <canvas id="vipChart"></canvas>
    </div>

    <div class="search-box">
        <h3>🔍 จัดการสมาชิกรายคน</h3>
        <input type="text" id="searchName" placeholder="พิมพ์ชื่อลูกค้า...">
        <button class="btn-blue" onclick="searchCustomer()">ค้นหา</button>
        
        <div id="resultArea" style="margin-top:20px; padding:15px; background:#1a1a2e; border-radius:10px;">
            ค้นหาชื่อลูกค้าเพื่อจัดการข้อมูล...
        </div>
    </div>

    <script>
        const API_URL = "https://kiston-cafe.onrender.com";
        let myChart;

        // ฟังก์ชันโหลดทุกอย่าง
        async function loadAll() {
            // โหลดตัวเลขสรุป
            let res1 = await fetch(`${API_URL}/summary`);
            let data1 = await res1.json();
            document.getElementById("total_revenue").innerText = data1.total_revenue.toLocaleString();
            document.getElementById("total_points").innerText = data1.total_points_given;

            // โหลดกราฟ
            let res2 = await fetch(`${API_URL}/top`);
            let data2 = await res2.json();
            const ctx = document.getElementById('vipChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data2.names,
                    datasets: [{ label: 'ยอดเปย์ (บาท)', data: data2.totals, backgroundColor: '#e94560' }]
                },
                options: { scales: { y: { beginAtZero: true } } }
            });
        }

        // ฟังก์ชันค้นหาและสร้างปุ่ม แก้ไข/ลบ
        async function searchCustomer() {
            let name = document.getElementById("searchName").value;
            if(!name) return;
            
            let res = await fetch(`${API_URL}/history/${encodeURIComponent(name)}`);
            let data = await res.json();

            if(data.visit_count === 0) {
                document.getElementById("resultArea").innerHTML = "❌ ไม่พบลูกค้านี้";
            } else {
                // สร้างหน้าต่างจัดการที่มีปุ่ม แจกแต้ม และ ลบ
                document.getElementById("resultArea").innerHTML = `
                    <b>คุณ ${data.name}</b> | แต้มปัจจุบัน: <span style="color:#e94560">${data.total_points}</span><br><br>
                    <button class="btn-green" onclick="managePoints('${data.name}', 50)">+ แจก 50 แต้ม</button>
                    <button class="btn-red" onclick="deleteMember('${data.name}')">🗑️ ลบสมาชิก</button>
                `;
            }
        }

        // ฟังก์ชันสั่งหลังบ้านให้เพิ่มแต้ม
        async function managePoints(name, pts) {
            await fetch(`${API_URL}/add_points/${encodeURIComponent(name)}/${pts}`);
            Swal.fire('สำเร็จ!', `เพิ่มแต้มให้คุณ ${name} แล้ว`, 'success');
            searchCustomer(); // อัปเดตหน้าจอค้นหา
            loadAll(); // อัปเดตกราฟ
        }

        // ฟังก์ชันสั่งหลังบ้านให้ลบชื่อ
        async function deleteMember(name) {
            const confirm = await Swal.fire({
                title: 'ยืนยันการลบ?',
                text: `ข้อมูลของคุณ ${name} จะหายถาวร!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'ลบเลย!'
            });

            if (confirm.isConfirmed) {
                await fetch(`${API_URL}/delete_customer/${encodeURIComponent(name)}`);
                Swal.fire('ลบแล้ว!', '', 'success');
                document.getElementById("resultArea").innerHTML = "ลบข้อมูลเรียบร้อย";
                loadAll();
            }
        }

        window.onload = function() {
            if (localStorage.getItem("kiston_auth") === "kiston-secure-99") {
                loadAll();
            } else {
                window.location.href = "login.html";
            }
        };
    </script>
</body>
</html>
