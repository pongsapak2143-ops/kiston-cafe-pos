<!DOCTYPE html>
<html>
<head>
    <title>Kiston Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: white; text-align: center; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-card { background: #16213e; padding: 25px; border-radius: 20px; width: 200px; border: 1px solid #0f3460; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-card h2 { color: #e94560; margin-bottom: 10px; font-size: 16px; }
        .stat-card p { font-size: 28px; font-weight: bold; margin: 0; color: #00d2ff; }
        .search-section, .chart-section { background: #16213e; padding: 30px; border-radius: 20px; max-width: 600px; margin: 20px auto; border: 1px solid #0f3460; }
        input { padding: 12px; border-radius: 8px; border: none; width: 250px; margin-bottom: 10px; }
        button { background: #e94560; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff4d6d; transform: scale(1.05); }
        .btn-search { background: #00d2ff; color: #1a1a2e; }
        #historyResult { margin-top: 20px; padding: 15px; border-radius: 10px; background: #1a1a2e; min-height: 50px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 30px;">📊 Kiston Cafe Dashboard</h1>

    <div class="container">
        <div class="stat-card"><h2>ลูกค้ารวม</h2><p id="total_customers">0</p></div>
        <div class="stat-card"><h2>รายได้รวม (บาท)</h2><p id="total_revenue">0</p></div>
        <div class="stat-card"><h2>แต้มที่แจกไป</h2><p id="total_points">0</p></div>
    </div>

    <button onclick="loadStats()">🔄 อัปเดตข้อมูล</button>
    <button onclick="resetData()" style="background: #333; margin-left: 10px;">🗑️ ล้างยอดขายทั้งหมด</button>

    <div class="chart-section">
        <h2 style="color: #00d2ff; margin-top: 0;">🏆 Top 5 ลูกค้า VIP ประจำร้าน</h2>
        <canvas id="vipChart"></canvas>
    </div>

    <div class="search-section">
        <h2 style="color: #00d2ff; margin-top: 0;">🔍 ค้นหาประวัติสมาชิก</h2>
        <input type="text" id="searchName" placeholder="พิมพ์ชื่อลูกค้า">
        <button class="btn-search" onclick="searchCustomer()">ค้นหา</button>
        <div id="historyResult">ใส่ชื่อลูกค้าแล้วกดค้นหา...</div>
    </div>

    <script>
        const API_URL = "https://kiston-cafe.onrender.com";
        let myChart; // ตัวแปรกราฟ

        async function loadStats() {
            try {
                let response = await fetch(`${API_URL}/summary`);
                let data = await response.json();
                document.getElementById("total_customers").innerText = data.total_customers;
                document.getElementById("total_revenue").innerText = data.total_revenue.toLocaleString();
                document.getElementById("total_points").innerText = data.total_points_given;
                
                loadChart();
            } catch (error) {
                console.error(error);
            }
        }

        async function loadChart() {
            try {
                let response = await fetch(`${API_URL}/top`);
                let data = await response.json();
                let ctx = document.getElementById('vipChart').getContext('2d');
                if(myChart) myChart.destroy(); 
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.names,
                        datasets: [{
                            label: 'ยอดเปย์รวม (บาท)',
                            data: data.totals,
                            backgroundColor: '#e94560',
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: 'white' } },
                            x: { grid: { color: '#333' }, ticks: { color: 'white' } }
                        },
                        plugins: {
                            legend: { labels: { color: 'white' } }
                        }
                    }
                });
            } catch (error) {
                console.error(error);
            }
        }

        async function resetData() {
            if (confirm("แน่ใจนะว่าจะล้างข้อมูลทั้งหมด?")) {
                try {
                    let response = await fetch(`${API_URL}/reset`);
                    let data = await response.json();
                    alert(data.message);
                    loadStats(); 
                } catch (error) {
                    alert("ติดต่อหลังบ้านไม่ได้จ้า!");
                }
            }
        }

        async function searchCustomer() {
            let name = document.getElementById("searchName").value;
            if (name === "") return alert("กรุณาใส่ชื่อที่ต้องการค้นหา");
            try {
                let response = await fetch(`${API_URL}/history/${encodeURIComponent(name)}`);
                let data = await response.json();
                
                if (data.visit_count === 0) {
                    document.getElementById("historyResult").innerHTML = "❌ ไม่พบข้อมูลลูกค้านี้";
                } else {
                    document.getElementById("historyResult").innerHTML = `
                        ชื่อ: <b style="color:#00d2ff">${data.name}</b><br>
                        ยอดซื้อ: <b style="color:#00d2ff">${data.total_spent.toLocaleString()}</b> บาท | 
                        แต้ม: <b style="color:#e94560">${data.total_points}</b><br><br>
                        
                        <button onclick="giveFreePoints('${data.name}')" style="background:#28a745; padding:5px 10px; font-size:12px; margin-bottom:5px;">+ แจก 50 แต้ม</button>
                        <button onclick="removeCustomer('${data.name}')" style="background:#dc3545; padding:5px 10px; font-size:12px; margin-left:10px;">🗑️ ลบลูกค้านี้</button>
                    `;
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาด");
            }
        }

        // ฟังก์ชันแจกแต้มฟรี
        async function giveFreePoints(name) {
            if(confirm(`ยืนยันแจกแต้มฟรี 50 แต้มให้คุณ ${name}?`)) {
                await fetch(`${API_URL}/add_points/${encodeURIComponent(name)}/50`);
                alert("แจกแต้มสำเร็จ!");
                searchCustomer(); 
                loadStats(); 
            }
        }

        // ฟังก์ชันลบลูกค้า
        async function removeCustomer(name) {
            if(confirm(`❗ ยืนยันการลบข้อมูลทั้งหมดของคุณ ${name}? (กู้คืนไม่ได้นะ)`)) {
                await fetch(`${API_URL}/delete_customer/${encodeURIComponent(name)}`);
                alert("ลบข้อมูลเรียบร้อย");
                document.getElementById("historyResult").innerHTML = "ใส่ชื่อลูกค้าแล้วกดค้นหา...";
                loadStats(); 
            }
        }

        window.onload = async function() {
            let savedPass = localStorage.getItem("kiston_auth");
            let response = await fetch(`${API_URL}/check_auth?password=${savedPass}`);
            let data = await response.json();

            if (data.status === "success") {
                loadStats();
            } else {
                window.location.href = "login.html";
            }
        };
    </script>
</body>
</html>
