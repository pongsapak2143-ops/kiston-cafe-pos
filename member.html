<!DOCTYPE html>
<html>
<head>
    <title>Kiston Member Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: white; text-align: center; padding: 20px; }
        .profile-card { background: linear-gradient(135deg, #16213e 0%, #0f3460 100%); padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 350px; margin: 50px auto; border: 1px solid #00d2ff; }
        h1 { color: #00d2ff; margin-bottom: 5px; }
        .points-label { font-size: 14px; opacity: 0.7; margin-top: 20px; }
        .points-value { font-size: 60px; font-weight: bold; color: #e94560; margin: 10px 0; }
        .footer { margin-top: 30px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="profile-card">
        <p style="font-size: 20px;">☕ Kiston Cafe Member</p>
        <h1 id="memberName">Loading...</h1>
        <div class="points-label">แต้มสะสมทั้งหมด</div>
        <div class="points-value" id="memberPoints">0</div>
        <p>Points</p>
        <div class="footer">ขอบคุณที่ใช้บริการร้านเราเสมอมาครับ</div>
    </div>

    <script>
        const API_URL = "https://kiston-cafe.onrender.com";
        
        async function loadProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            
            if (!name) {
                document.body.innerHTML = "<h1>ไม่พบข้อมูลสมาชิก</h1>";
                return;
            }

            try {
                let response = await fetch(`${API_URL}/history/${encodeURIComponent(name)}`);
                let data = await response.json();
                
                document.getElementById("memberName").innerText = data.name;
                document.getElementById("memberPoints").innerText = data.total_points.toLocaleString();
            } catch (error) {
                console.error(error);
            }
        }
        loadProfile();
    </script>
</body>
</html>
