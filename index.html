<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Kiston Cafe POS</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { background-color: #f3e5f5; font-family: 'Tahoma', sans-serif; text-align: center; padding: 50px; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0px 5px 15px rgba(0,0,0,0.2); display: inline-block; }
        input, button { margin: 10px; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        button { background-color: #8e24aa; color: white; cursor: pointer; border: none; font-weight: bold; }
        
        /* 🌟 สเต็ป 2.1: เพิ่มสีฟ้าให้ปุ่มสมาชิก */
        .btn-member { 
            background-color: #00d2ff !important; 
            color: #1a1a2e !important; 
        }

        #receipt-template {
            width: 250px; padding: 20px; background: white; color: black;
            font-family: 'Courier New', sans-serif; text-align: center;
            border: 1px solid #ddd; position: absolute; left: -9999px;
        }
        .line { border-top: 1px dashed #000; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>☕ Kiston Cafe POS</h2>
        <input type="text" id="nameInput" placeholder="ชื่อลูกค้า">
        <input type="number" id="moneyInput" placeholder="ยอดเงิน (บาท)"><br>
        
        <button onclick="calculateAndShow()">คำนวณแต้ม</button>
        
        <br>
        <button class="btn-member" onclick="showMemberCard()">บัตรสมาชิก / เช็คแต้ม 💳</button>
    </div>

    <div id="receipt-template">
        <h3 style="margin:0;">KISTON CAFE</h3>
        <div class="line"></div>
        <p>ชื่อ: <span id="rec-name"></span></p>
        <p>ยอดซื้อ: <span id="rec-price"></span> บาท</p>
        <h2 style="margin: 10px 0;">+ <span id="rec-points"></span> แต้ม</h2>
        <div class="line"></div>
        <p style="font-size: 10px;" id="rec-date"></p>
    </div>

    <script>
        async function calculateAndShow() {
            let name = document.getElementById("nameInput").value || "Guest";
            let price = document.getElementById("moneyInput").value;
            
            if (price <= 0) return Swal.fire('ลืมใส่เงิน!', 'กรุณากรอกยอดเงินด้วยครับ', 'warning');

            Swal.showLoading();

            try {
                let response = await fetch(`https://kiston-cafe.onrender.com/calculate/${encodeURIComponent(name)}/${price}`);
                let data = await response.json();

                document.getElementById("rec-name").innerText = data.name;
                document.getElementById("rec-price").innerText = price;
                document.getElementById("rec-points").innerText = data.points;
                document.getElementById("rec-date").innerText = new Date().toLocaleString();

                Swal.fire({
                    icon: 'success',
                    title: 'สะสมแต้มสำเร็จ!',
                    text: `คุณได้รับ ${data.points} แต้ม`,
                    showCancelButton: true,
                    confirmButtonText: 'รับใบเสร็จ 🎫',
                    cancelButtonText: 'ปิด',
                    confirmButtonColor: '#8e24aa'
                }).then((result) => {
                    if (result.isConfirmed) {
                        generateImage();
                    }
                });

                document.getElementById("moneyInput").value = "";

            } catch (e) {
                Swal.fire('Error', 'ติดต่อหลังบ้านไม่ได้', 'error');
            }
        }

        function generateImage() {
            const receipt = document.getElementById("receipt-template");
            receipt.style.left = "0";
            
            html2canvas(receipt).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                Swal.fire({
                    title: 'ใบเสร็จของคุณ',
                    imageUrl: imgData,
                    text: 'กดค้างที่รูปเพื่อบันทึกภาพ',
                    confirmButtonColor: '#8e24aa'
                });
                receipt.style.left = "-9999px";
            });
        }

        async function showMemberCard() {
            let name = document.getElementById("nameInput").value;
            if (!name) return Swal.fire('ใส่ชื่อก่อน!', 'กรุณาพิมพ์ชื่อของคุณเพื่อดูบัตรสมาชิก', 'warning');

            Swal.showLoading();

            try {
                let response = await fetch(`https://kiston-cafe.onrender.com/history/${encodeURIComponent(name)}`);
                let data = await response.json();

                if (data.visit_count === 0) {
                    return Swal.fire('ไม่พบข้อมูล', 'คุณยังไม่มีประวัติการซื้อในร้านเราครับ', 'info');
                }

                Swal.fire({
                    title: `บัตรสมาชิก Kiston VIP`,
                    html: `
                        <div style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 20px; border-radius: 15px; color: white; text-align: left;">
                            <h4 style="margin:0; color:#00d2ff;">${data.name}</h4>
                            <p style="font-size: 12px; opacity: 0.8;">Member ID: #KC-${Math.floor(Math.random() * 1000)}</p>
                            <hr style="opacity: 0.2;">
                            <p style="margin: 5px 0;">แต้มสะสม: <b style="font-size: 20px; color:#e94560;">${data.total_points}</b> PT</p>
                            <div id="qrcode_area" style="background:white; padding:10px; display:inline-block; border-radius:10px; margin-top:10px;"></div>
                        </div>
                    `,
                    confirmButtonText: 'ปิด',
                    didOpen: () => {
                        new QRCode(document.getElementById("qrcode_area"), {
                            text: `https://kiston-cafe-pos-mkf8.vercel.app/admin.html?search=${name}`,
                            width: 128,
                            height: 128
                        });
                    }
                });

            } catch (e) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            }
        }
    </script>
</body>
</html>
